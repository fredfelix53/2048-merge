<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2048 Merge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="shopBtn" onclick="ShopUI.open()">🛒 Shop</button>
  <div id="gameContainer">
    <div id="header">
      <h1>2048</h1>
      <div class="stats">
        <span>Best: <span id="bestTile">-</span></span>
      </div>
    </div>
    <div id="scoreBar">
      <div class="stat-item"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="stat-item"><div class="label">Merges</div><div class="value" id="merges">0</div></div>
      <button id="undoBtn">↩️</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">
      <button class="primary" id="newGame">🔄 New Game</button>
    </div>
    <div class="progress-bar">
      <span>Lv.<span id="playerLevel">1</span></span>
      <div class="bar"><div class="fill" id="xpFill" style="width:0%"></div></div>
    </div>
  </div>

  <div id="gameOverScreen">
    <h2>🎮 Game Over</h2>
    <p>Score: <span id="finalScore">0</span></p>
    <p>Best Tile: <span id="finalBestTile">0</span></p>
    <p>Total Merges: <span id="finalMerges">0</span></p>
    <button onclick="Merge2048.restartGame()">🔄 Play Again</button>
  </div>

  <div id="achievement"></div>
  <div id="notification"></div>

  <script src="visuals.js"></script>
  <script src="progression.js"></script>
  <script src="shop.js"></script>
  <script src="ads-manager.js"></script>
  <script src="challenges-system.js"></script>
  <script src="store-rotator.js"></script>
  <script src="retention-system.js"></script>
  <script src="collectibles-system.js"></script>
  <script src="tutorial-system.js"></script>
  <script src="game.js"></script>
</body>
</html>
